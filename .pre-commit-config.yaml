# Pre-commit hooks configuration for ChatFilter
# See https://pre-commit.com for more information

repos:
  # Ruff linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      # Run the formatter
      - id: ruff-format
        types_or: [python, pyi]

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending

  # Type checking with mypy (src only, matching CI)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - telethon>=1.34.0
          - fastapi>=0.109.0
          - pydantic>=2.5.0
          - pydantic-settings>=2.1.0
          - cryptography>=41.0.0
          - keyring>=25.0.0
          - jinja2>=3.1.0
        args: [--config-file=pyproject.toml, --follow-imports=silent]

  # Security scanning with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-ll']  # Only fail on medium/high severity
        additional_dependencies: ['bandit[toml]']

  # Project-specific guards against clutter regression
  - repo: local
    hooks:
      - id: version-sync
        name: "__version__ matches CHANGELOG top entry"
        language: system
        entry: python3 tools/check_version_sync.py
        pass_filenames: false
        files: ^(src/chatfilter/__init__\.py|CHANGELOG\.md)$

      - id: no-db-in-root
        name: "No *.db files in project root"
        language: fail
        entry: "SQLite databases must live in data/, not git-root. Delete the file or use CHATFILTER_DATA_DIR."
        files: '^[^/]+\.(db|db-shm|db-wal)$'

      - id: no-binary-in-root
        name: "No binary/screenshot files in project root"
        language: fail
        entry: "Binary files (png/jpg/mo/session/patch/xml) do not belong in project root."
        files: '^[^/]+\.(png|jpg|jpeg|mo|pot|session|patch|xml)$'

      - id: no-ephemeral-reports
        name: "No session-report MDs in project root"
        language: fail
        entry: "Ephemeral reports belong in docs/ or nowhere, not git-root."
        files: '^(VERIFICATION|SMOKE_TEST|TASK_|MANUAL_|DECISION|.*\.prev).*\.md$'
