{% extends "base.html" %}

{% block title %}{{ _("Catalog") }} — ChatFilter{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ _("Chat Catalog") }}</h1>
</div>

<section class="filter-panel" aria-label="{{ _("Filters") }}">
    <form id="catalog-filters"
          hx-get="/api/catalog"
          hx-target="#catalog-table-container"
          hx-trigger="change, input delay:400ms from:[name=search]"
          hx-include="[name]"
          hx-indicator="#catalog-loading"
          hx-on:htmx:response-error="document.getElementById('catalog-table-container').innerHTML = '<div class=alert>{{ _("Error: failed to load") }}</div>'">

        <div class="filter-row">
            <div class="filter-group">
                <label for="filter-chat-type">{{ _("Type") }}</label>
                <select name="chat_type" id="filter-chat-type">
                    <option value="">{{ _("All") }}</option>
                    <option value="group">{{ _("Group") }}</option>
                    <option value="forum">{{ _("Forum") }}</option>
                    <option value="channel_comments">{{ _("Channel (with comments)") }}</option>
                    <option value="channel_no_comments">{{ _("Channel (no comments)") }}</option>
                    <option value="pending">{{ _("Pending") }}</option>
                    <option value="dead">{{ _("Dead") }}</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-min-subs">{{ _("Min subscribers") }}</label>
                <input type="number" name="min_subscribers" id="filter-min-subs"
                       min="0" placeholder="0">
            </div>

            <div class="filter-group">
                <label for="filter-max-subs">{{ _("Max subscribers") }}</label>
                <input type="number" name="max_subscribers" id="filter-max-subs"
                       min="0" placeholder="—">
            </div>

            <div class="filter-group">
                <label for="filter-moderation">{{ _("Moderation") }}</label>
                <select name="has_moderation" id="filter-moderation">
                    <option value="">{{ _("Any") }}</option>
                    <option value="true">{{ _("Yes") }}</option>
                    <option value="false">{{ _("No") }}</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-captcha">{{ _("Captcha") }}</label>
                <select name="has_captcha" id="filter-captcha">
                    <option value="">{{ _("Any") }}</option>
                    <option value="true">{{ _("Yes") }}</option>
                    <option value="false">{{ _("No") }}</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-min-activity">{{ _("Min msg/h") }}</label>
                <input type="number" name="min_activity" id="filter-min-activity"
                       min="0" step="0.1" placeholder="0">
            </div>

            <div class="filter-group">
                <label for="filter-max-activity">{{ _("Max msg/h") }}</label>
                <input type="number" name="max_activity" id="filter-max-activity"
                       min="0" step="0.1" placeholder="—">
            </div>

            <div class="filter-group">
                <label for="filter-fresh">{{ _("Fresh (days)") }}</label>
                <input type="number" name="fresh_only" id="filter-fresh"
                       min="1" placeholder="—">
            </div>

            <div class="filter-group filter-group--search">
                <label for="filter-search">{{ _("Search") }}</label>
                <input type="text" name="search" id="filter-search"
                       placeholder="{{ _("Title or @username") }}">
            </div>
        </div>

        <div class="filter-row filter-row--sort">
            <div class="filter-group">
                <label for="filter-sort-by">{{ _("Sort by") }}</label>
                <select name="sort_by" id="filter-sort-by">
                    <option value="">{{ _("Default") }}</option>
                    <option value="title">{{ _("Title") }}</option>
                    <option value="subscribers">{{ _("Subscribers") }}</option>
                    <option value="activity">{{ _("Activity") }}</option>
                    <option value="authors">{{ _("Authors") }}</option>
                    <option value="last_check">{{ _("Last check") }}</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-sort-dir">{{ _("Direction") }}</label>
                <select name="sort_dir" id="filter-sort-dir">
                    <option value="asc">{{ _("Ascending") }}</option>
                    <option value="desc">{{ _("Descending") }}</option>
                </select>
            </div>
        </div>

        <input type="hidden" name="page" id="catalog-page" value="1">
    </form>

    <div class="filter-row filter-row--actions">
        <a id="export-csv-btn" href="/api/catalog/export" class="btn btn-secondary btn-export-csv">
            <svg class="export-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span class="export-icon-spinner spinner-small" aria-hidden="true"></span>
            <span class="export-label">{{ _("Export CSV") }}</span>
        </a>
    </div>
</section>
<script>
(function() {
    var form = document.getElementById('catalog-filters');
    var exportBtn = document.getElementById('export-csv-btn');

    function updateExportHref() {
        if (!exportBtn) return;
        var data = new FormData(form);
        var params = new URLSearchParams();
        data.forEach(function(value, key) {
            if (key !== 'page' && value !== '') {
                params.append(key, value);
            }
        });
        var qs = params.toString();
        exportBtn.dataset.href = '/api/catalog/export' + (qs ? '?' + qs : '');
        // Re-apply href only if not disabled
        if (!exportBtn.classList.contains('btn--disabled')) {
            exportBtn.href = exportBtn.dataset.href;
        }
    }

    function updateExportState() {
        if (!exportBtn) return;
        var container = document.getElementById('catalog-table-container');
        var hasNoResults = container && container.querySelector('.no-results');
        if (hasNoResults) {
            exportBtn.classList.add('btn--disabled');
            exportBtn.removeAttribute('href');
            exportBtn.title = '{{ _("No results to export") }}';
        } else {
            exportBtn.classList.remove('btn--disabled');
            exportBtn.href = exportBtn.dataset.href || '/api/catalog/export';
            exportBtn.title = '';
        }
    }

    if (exportBtn) {
        exportBtn.addEventListener('click', function() {
            if (exportBtn.dataset.exporting) return;
            exportBtn.dataset.exporting = '1';
            exportBtn.classList.add('btn--exporting');
            setTimeout(function() {
                exportBtn.classList.remove('btn--exporting');
                delete exportBtn.dataset.exporting;
            }, 3000);
        });
    }

    if (form) {
        form.addEventListener('change', function() {
            document.getElementById('catalog-page').value = '1';
            updateExportHref();
        });
        form.addEventListener('input', function(e) {
            if (e.target.name === 'search') {
                document.getElementById('catalog-page').value = '1';
            }
            updateExportHref();
        });
        updateExportHref();
    }

    document.addEventListener('htmx:afterSwap', function(e) {
        if (e.detail && e.detail.target && e.detail.target.id === 'catalog-table-container') {
            updateExportState();
        }
    });
})();
</script>

<div id="catalog-loading" class="htmx-indicator">
    <table class="data-table catalog-table skeleton-results-table" aria-hidden="true">
        <thead>
            <tr>
                <th><span class="skeleton skeleton-text skeleton-text-wide"></span></th>
                <th><span class="skeleton skeleton-text skeleton-text-short"></span></th>
                <th><span class="skeleton skeleton-text skeleton-text-short"></span></th>
                <th><span class="skeleton skeleton-text skeleton-text-short"></span></th>
                <th><span class="skeleton skeleton-text skeleton-text-short"></span></th>
                <th><span class="skeleton skeleton-text skeleton-text-short"></span></th>
                <th><span class="skeleton skeleton-text skeleton-text-short"></span></th>
                <th><span class="skeleton skeleton-text skeleton-text-short"></span></th>
            </tr>
        </thead>
        <tbody>
            {% for _ in range(6) %}
            <tr class="skeleton-results-row">
                <td><span class="skeleton skeleton-cell skeleton-cell-short"></span></td>
                <td><span class="skeleton skeleton-cell skeleton-cell-number"></span></td>
                <td><span class="skeleton skeleton-cell skeleton-cell-number"></span></td>
                <td><span class="skeleton skeleton-cell skeleton-cell-number"></span></td>
                <td><span class="skeleton skeleton-cell skeleton-cell-number"></span></td>
                <td><span class="skeleton skeleton-cell skeleton-cell-number"></span></td>
                <td><span class="skeleton skeleton-cell skeleton-cell-number"></span></td>
                <td><span class="skeleton skeleton-cell skeleton-cell-short"></span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<div id="catalog-table-container"
     hx-get="/api/catalog"
     hx-trigger="load"
     hx-indicator="#catalog-loading"
     hx-on:htmx:response-error="this.innerHTML = '<div class=alert>{{ _("Error: failed to load") }}</div>'">
</div>
{% endblock %}
