{% extends "base.html" %}

{% block title %}{{ _("Admin") }} — ChatFilter{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ _("Admin Panel") }}</h1>
</div>

{% include "partials/admin_tabs.html" %}

<div id="admin-content"></div>

<style>
.admin-tab-btn.active {
    border-bottom-color: var(--primary, #2563eb) !important;
    color: var(--primary, #2563eb) !important;
    font-weight: 500;
}
</style>

<script>
function setActiveTab(el) {
    document.querySelectorAll('.admin-tab-btn').forEach(function(btn) {
        btn.classList.remove('active');
    });
    el.classList.add('active');
}
document.addEventListener('DOMContentLoaded', function() {
    var path = window.location.pathname;
    var tabIndex = { '/admin/users': 0, '/admin/platforms': 1, '/admin/system': 2 };
    var idx = (path in tabIndex) ? tabIndex[path] : 0;
    var tabs = document.querySelectorAll('.admin-tab-btn');
    if (tabs[idx]) {
        setActiveTab(tabs[idx]);
        htmx.trigger(tabs[idx], 'click');
    }
});
</script>
{% endblock %}
