{% extends "base.html" %}

{% block title %}{{ _("Admin") }} — ChatFilter{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ _("Admin Panel") }}</h1>
</div>

<nav class="admin-tabs" style="display:flex;gap:0;border-bottom:2px solid var(--border-color,#ddd);margin-bottom:1.5rem">
    <button class="admin-tab-btn"
            hx-get="/admin/tab/users"
            hx-target="#admin-content"
            hx-swap="innerHTML"
            hx-push-url="/admin/users"
            style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.95rem;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-muted,#666)"
            onclick="setActiveTab(this)">
        {{ _("Users") }}
    </button>
    <button class="admin-tab-btn"
            hx-get="/admin/tab/platforms"
            hx-target="#admin-content"
            hx-swap="innerHTML"
            hx-push-url="/admin/platforms"
            style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.95rem;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-muted,#666)"
            onclick="setActiveTab(this)">
        {{ _("Platforms") }}
    </button>
    <button class="admin-tab-btn"
            hx-get="/admin/tab/system"
            hx-target="#admin-content"
            hx-swap="innerHTML"
            hx-push-url="/admin/system"
            style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.95rem;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-muted,#666)"
            onclick="setActiveTab(this)">
        {{ _("System") }}
    </button>
    <a href="/admin/accounts"
       class="admin-tab-btn"
       style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.95rem;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-muted,#666);text-decoration:none;display:inline-flex;align-items:center">
        {{ _("Accounts") }}
    </a>
    <a href="/admin/proxies"
       class="admin-tab-btn"
       style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.95rem;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-muted,#666);text-decoration:none;display:inline-flex;align-items:center">
        {{ _("Proxies") }}
    </a>
    <a href="/admin/queue"
       class="admin-tab-btn"
       style="padding:0.6rem 1.25rem;border:none;background:none;cursor:pointer;font-size:0.95rem;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-muted,#666);text-decoration:none;display:inline-flex;align-items:center">
        {{ _("Queue") }}
    </a>
</nav>

<div id="admin-content"></div>

<style>
.admin-tab-btn.active {
    border-bottom-color: var(--primary, #2563eb) !important;
    color: var(--primary, #2563eb) !important;
    font-weight: 500;
}
</style>

<script>
function setActiveTab(el) {
    document.querySelectorAll('.admin-tab-btn').forEach(function(btn) {
        btn.classList.remove('active');
    });
    el.classList.add('active');
}
document.addEventListener('DOMContentLoaded', function() {
    var path = window.location.pathname;
    var tabIndex = { '/admin/users': 0, '/admin/platforms': 1, '/admin/system': 2 };
    var idx = (path in tabIndex) ? tabIndex[path] : 0;
    var tabs = document.querySelectorAll('.admin-tab-btn');
    if (tabs[idx]) {
        setActiveTab(tabs[idx]);
        htmx.trigger(tabs[idx], 'click');
    }
});
</script>
{% endblock %}
