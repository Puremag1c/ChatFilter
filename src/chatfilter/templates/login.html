{% extends 'base_minimal.html' %}

{% block title %}{{ _('Login') }} — ChatFilter{% endblock %}

{% block content %}
<style>
    .login-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        padding: 2rem;
    }
    .login-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 2.5rem;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 2px 12px var(--shadow-lg);
    }
    .login-card .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 2rem;
        font-size: 0.9rem;
    }
    .form-group {
        margin-bottom: 1rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text-primary);
    }
    .form-group input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 1rem;
        box-sizing: border-box;
        background: var(--bg-input);
        color: var(--text-primary);
    }
    .login-btn {
        width: 100%;
        padding: 0.7rem;
        margin-top: 0.5rem;
        font-size: 1rem;
        cursor: pointer;
        justify-content: center;
    }
    .login-error {
        background: var(--danger-bg);
        border: 1px solid var(--danger);
        color: var(--danger-text);
        border-radius: 4px;
        padding: 0.75rem 1rem;
        margin-bottom: 1rem;
        font-size: 0.9rem;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <p class="subtitle">{{ _("Telegram Chat Analysis") }}</p>

        {% if error %}
        <div class="login-error" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group">
                <label for="username">{{ _('Username') }}</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    value="{{ login_username or '' }}"
                    autocomplete="username"
                    autofocus
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">{{ _('Password') }}</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary login-btn">{{ _('Log in') }}</button>
        </form>
    </div>
</div>
{% endblock %}
