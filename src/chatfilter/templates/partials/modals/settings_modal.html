{# Group Settings Modal #}
<div id="settings-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
    <div class="modal-dialog" role="document">
        <div class="modal-header">
            <span class="modal-icon info" aria-hidden="true">⚙️</span>
            <h2 class="modal-title" id="settings-modal-title">{{ _("Group Settings") }}</h2>
        </div>
        <form id="settings-form"
              hx-put="/api/groups/{{ group.id }}/settings"
              hx-target="#group-{{ group.id }}"
              hx-swap="outerHTML">
            <div class="modal-body">
                <div class="form-group">
                    <p style="margin-bottom: 1rem; font-weight: 600;">{{ _("Analysis Mode") }}</p>

                    <div style="display: flex; flex-direction: column; gap: 1rem;">
                        <label style="display: flex; align-items: flex-start; gap: 0.75rem; cursor: pointer;">
                            <input type="radio"
                                   name="analysis_mode"
                                   value="quick"
                                   {% if group.settings.inferred_mode == 'quick' %}checked{% endif %}
                                   style="margin-top: 0.2rem; flex-shrink: 0;">
                            <div>
                                <div style="font-weight: 500;">{{ _("Quick Analysis") }}</div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary, #666);">
                                    {{ _("(chat type, subscribers, moderation — no join required)") }}
                                </div>
                            </div>
                        </label>

                        <label style="display: flex; align-items: flex-start; gap: 0.75rem; cursor: pointer;">
                            <input type="radio"
                                   name="analysis_mode"
                                   value="deep"
                                   {% if group.settings.inferred_mode == 'deep' %}checked{% endif %}
                                   style="margin-top: 0.2rem; flex-shrink: 0;">
                            <div>
                                <div style="font-weight: 500;">{{ _("Deep Analysis") }}</div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary, #666);">
                                    {{ _("(everything + activity, authors, captcha — requires joining chat)") }}
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <div id="settings-error" class="alert alert-error" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="modal-button secondary" onclick="closeModal('settings-modal')">
                    {{ _("Cancel") }}
                </button>
                <button type="submit" class="modal-button primary">
                    {{ _("Save Settings") }}
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const modalId = 'settings-modal';
    const modal = document.getElementById(modalId);

    // Show modal
    modal.classList.add('show');

    // Form submission handler
    document.getElementById('settings-form').addEventListener('htmx:afterRequest', function(event) {
        if (event.detail.successful) {
            // Close modal on success
            closeModal();
        } else {
            // Show error
            const errorDiv = document.getElementById('settings-error');
            errorDiv.textContent = event.detail.xhr.responseText || 'Failed to update settings';
            errorDiv.style.display = 'block';
        }
    });

    // Modal close function with cleanup
    function closeModal() {
        modal.classList.remove('show');

        // Cleanup: remove event listeners
        document.removeEventListener('keydown', handleEscape);

        // Remove DOM after transition
        setTimeout(() => modal.remove(), 300);
    }

    // Named handler for escape key (allows removal)
    function handleEscape(e) {
        if (e.key === 'Escape') {
            closeModal();
        }
    }

    // Close on overlay click
    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            closeModal();
        }
    });

    // Close on Escape key
    document.addEventListener('keydown', handleEscape);

    // Expose for inline onclick handler and external calls
    window.closeModal = function(modalIdParam) {
        // Support both old signature closeModal('settings-modal') and new closeModal()
        if (!modalIdParam || modalIdParam === modalId) {
            closeModal();
        }
    };
})();
</script>
