{# Credentials Modal #}
<div id="credentials-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="credentials-modal-title">
    <div class="modal-dialog" role="document">
        <div class="modal-header">
            <span class="modal-icon info" aria-hidden="true">🔐</span>
            <h2 class="modal-title" id="credentials-modal-title">{{ _("Enter API Credentials") }}</h2>
        </div>
        <form id="credentials-form"
              hx-put="/api/sessions/{session_id}/credentials"
              hx-target="#session-{session_id}"
              hx-swap="outerHTML"
              hx-indicator="#credentials-spinner">
            <div class="modal-body">
                <p class="modal-description">
                    {{ _("To use your own API credentials, you need to create an application at") }}
                    <a href="https://my.telegram.org/apps" target="_blank" rel="noopener noreferrer">my.telegram.org</a>.
                </p>
                <div class="form-group">
                    <label for="credentials-api-id">
                        {{ _("API ID") }}
                        <span class="required">*</span>
                    </label>
                    <input type="number"
                           id="credentials-api-id"
                           name="api_id"
                           class="form-input"
                           required
                           min="1"
                           placeholder="12345678"
                           aria-required="true"
                           aria-describedby="api-id-help">
                    <small id="api-id-help" class="form-help">
                        {{ _("Numeric ID from my.telegram.org") }}
                    </small>
                </div>
                <div class="form-group">
                    <label for="credentials-api-hash">
                        {{ _("API Hash") }}
                        <span class="required">*</span>
                    </label>
                    <input type="text"
                           id="credentials-api-hash"
                           name="api_hash"
                           class="form-input"
                           required
                           pattern="[a-f0-9]{32}"
                           maxlength="32"
                           placeholder="0123456789abcdef0123456789abcdef"
                           aria-required="true"
                           aria-describedby="api-hash-help">
                    <small id="api-hash-help" class="form-help">
                        {{ _("32-character hexadecimal string from my.telegram.org") }}
                    </small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="modal-button secondary" id="credentials-modal-cancel">
                    {{ _("Cancel") }}
                </button>
                <button type="submit" class="modal-button primary" id="credentials-modal-submit">
                    <span class="btn-text">{{ _("Submit") }}</span>
                    <span id="credentials-spinner" class="htmx-indicator spinner"></span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    // Handle credentials modal submit
    document.body.addEventListener('htmx:configRequest', function(evt) {
        if (evt.detail.path && evt.detail.path.includes('/credentials')) {
            const modal = document.getElementById('credentials-modal');
            const sessionId = modal?.dataset?.sessionId;
            if (sessionId) {
                evt.detail.path = `/api/sessions/${sessionId}/credentials`;
                evt.detail.target = document.getElementById(`session-${sessionId}`);
            }
        }
    });

    // Close modal on successful submit
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.pathInfo.requestPath.includes('/credentials')) {
            const modal = document.getElementById('credentials-modal');
            if (modal) {
                modal.classList.remove('visible');
                // Clear form
                const form = document.getElementById('credentials-form');
                if (form) form.reset();
            }
        }
    });
})();
</script>
