{% if users %}
<div class="admin-users-table-container">
    <table class="admin-users-table" role="table" aria-label="{{ _("Admin users list") }}">
        <thead>
            <tr>
                <th scope="col">{{ _("Username") }}</th>
                <th scope="col">{{ _("Admin") }}</th>
                <th scope="col">{{ _("Balance") }}</th>
                <th scope="col">{{ _("Created") }}</th>
                <th scope="col">{{ _("Actions") }}</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            {% include "partials/admin_user_row.html" %}
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<p style="padding:1rem;color:var(--text-muted)">{{ _("No users found.") }}</p>
{% endif %}
