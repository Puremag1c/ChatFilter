{% if users %}
<table style="width:100%;border-collapse:collapse">
    <thead>
        <tr style="border-bottom:2px solid var(--border-color)">
            <th style="text-align:left;padding:0.5rem 1rem">Username</th>
            <th style="text-align:left;padding:0.5rem 1rem">Admin</th>
            <th style="text-align:left;padding:0.5rem 1rem">Created</th>
            <th style="text-align:right;padding:0.5rem 1rem">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr style="border-bottom:1px solid var(--border-color)" id="user-row-{{ user.id }}">
            <td style="padding:0.5rem 1rem">
                <strong>{{ user.username }}</strong>
                {% if user.is_admin %}<span style="font-size:0.75rem;color:var(--accent-color);margin-left:0.5rem">[admin]</span>{% endif %}
            </td>
            <td style="padding:0.5rem 1rem">{{ "Yes" if user.is_admin else "No" }}</td>
            <td style="padding:0.5rem 1rem;font-size:0.875rem;color:var(--text-muted)">{{ user.created_at[:10] if user.created_at else "—" }}</td>
            <td style="padding:0.5rem 1rem;text-align:right;white-space:nowrap">
                <!-- Change password form -->
                <form method="post" action="/admin/users/{{ user.id }}/password"
                      style="display:inline-flex;gap:0.5rem;align-items:center;margin-right:0.5rem">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <input type="password" name="password" required
                           class="form-input" placeholder="new password"
                           autocomplete="new-password"
                           style="font-size:0.8rem;padding:0.25rem 0.5rem;width:130px">
                    <button type="submit" class="btn btn-secondary"
                            style="font-size:0.8rem;padding:0.25rem 0.6rem">Change Password</button>
                </form>
                <!-- Delete button -->
                <button type="button"
                        class="btn btn-danger"
                        style="font-size:0.8rem;padding:0.25rem 0.6rem"
                        hx-delete="/admin/users/{{ user.id }}"
                        hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'
                        hx-target="#user-row-{{ user.id }}"
                        hx-swap="outerHTML"
                        hx-confirm="Delete user '{{ user.username }}'? This cannot be undone.">
                    Delete
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p style="padding:1rem;color:var(--text-muted)">No users found.</p>
{% endif %}
