{# Single admin user row partial #}
{# Receives: user, current_user_id, csrf_token #}
<tr id="user-row-{{ user.id }}">
    <td data-label="{{ _("Username") }}">
        <strong>{{ user.username }}</strong>
        {% if user.is_admin %}<span class="admin-badge">[admin]</span>{% endif %}
    </td>
    <td data-label="{{ _("Admin") }}">
        <button type="button"
                class="btn btn-sm {% if user.is_admin %}btn-warning{% else %}btn-secondary{% endif %}"
                hx-post="/admin/users/{{ user.id }}/toggle-admin"
                hx-target="#user-row-{{ user.id }}"
                hx-swap="outerHTML"
                {% if user.id == current_user_id %}disabled title="{{ _("Cannot remove own admin rights") }}"{% endif %}>
            {{ _("Yes") if user.is_admin else _("No") }}
        </button>
    </td>
    <td data-label="{{ _("Balance") }}" id="balance-{{ user.id }}">${{ "%.2f"|format(user.ai_balance_usd|default(0.0)) }}</td>
    <td data-label="{{ _("Created") }}">{{ user.created_at[:10] if user.created_at else "—" }}</td>
    <td data-label="{{ _("Actions") }}">
        <div class="admin-user-actions">
            <!-- Top up balance form -->
            <form class="admin-topup-form"
                  hx-post="/admin/users/{{ user.id }}/topup"
                  hx-target="#balance-{{ user.id }}"
                  hx-swap="outerHTML"
                  hx-on::after-request="if(event.detail.successful) this.querySelector('[name=amount]').value = ''"
                  style="display:flex;gap:0.25rem;align-items:center">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="number" name="amount" required min="0.01" step="0.01"
                       class="form-input" placeholder="$0.00" style="width:6rem">
                <button type="submit" class="btn btn-secondary">{{ _("Top up") }}</button>
            </form>
            <!-- Change password form -->
            <form hx-post="/admin/users/{{ user.id }}/password" hx-swap="none" class="admin-password-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="password" name="password" required
                       class="form-input" placeholder="{{ _("new password") }}"
                       autocomplete="new-password">
                <button type="submit" class="btn btn-secondary">{{ _("Change Password") }}</button>
            </form>
            <!-- Delete button -->
            <button type="button"
                    class="btn btn-danger"
                    hx-delete="/admin/users/{{ user.id }}"
                    hx-target="#user-row-{{ user.id }}"
                    hx-swap="outerHTML"
                    hx-confirm="Удалить пользователя {{ user.username }} и все его данные? Это действие необратимо.">
                {{ _("Delete") }}
            </button>
        </div>
    </td>
</tr>
