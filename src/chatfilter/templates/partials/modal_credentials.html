{# Modal for API Credentials Input #}
<div id="modal-credentials" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-credentials-title" style="display: none;">
    <div class="modal-dialog">
        <div class="modal-header">
            <span class="modal-icon info">🔑</span>
            <h3 id="modal-credentials-title" class="modal-title">{{ _("Enter API Credentials") }}</h3>
        </div>

        <div class="modal-body">
            <form id="modal-credentials-form"
                  hx-put="/api/sessions/{session_id}/credentials"
                  hx-target="#auth-flow-result"
                  hx-swap="innerHTML"
                  hx-indicator="#modal-credentials-spinner">

                <div class="form-group">
                    <label for="modal-credentials-api-id">{{ _("API ID") }}</label>
                    <input type="text"
                           id="modal-credentials-api-id"
                           name="api_id"
                           required
                           placeholder="{{ _('Your Telegram API ID from my.telegram.org') }}"
                           pattern="[0-9]+"
                           autocomplete="off"
                           autofocus
                           aria-required="true">
                </div>

                <div class="form-group">
                    <label for="modal-credentials-api-hash">{{ _("API Hash") }}</label>
                    <input type="text"
                           id="modal-credentials-api-hash"
                           name="api_hash"
                           required
                           placeholder="{{ _('Your Telegram API Hash from my.telegram.org') }}"
                           autocomplete="off"
                           aria-required="true">
                </div>

                <div class="form-help">
                    <a href="https://my.telegram.org" target="_blank" rel="noopener noreferrer">
                        {{ _("Get credentials at my.telegram.org") }}
                    </a>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" data-modal-close>
                        {{ _("Cancel") }}
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <span class="btn-text">{{ _("Save") }}</span>
                        <span id="modal-credentials-spinner" class="htmx-indicator spinner"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
