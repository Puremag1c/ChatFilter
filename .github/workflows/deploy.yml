name: Deploy ChatFilter

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (tag, branch, or commit SHA)'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_REF: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Get version
        id: version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('src/chatfilter/__init__.py').read()).group(1))")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Deploying version: ${VERSION} (ref: ${{ env.DEPLOY_REF }})"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          CHATFILTER_API_ID: ${{ secrets.CHATFILTER_API_ID }}
          CHATFILTER_API_HASH: ${{ secrets.CHATFILTER_API_HASH }}
          CHATFILTER_ADMIN_LOGIN: ${{ secrets.CHATFILTER_ADMIN_LOGIN }}
          CHATFILTER_ADMIN_PASSWORD: ${{ secrets.CHATFILTER_ADMIN_PASSWORD }}
          CHATFILTER_DATABASE_URL: ${{ secrets.CHATFILTER_DATABASE_URL }}
          DEPLOY_REF: ${{ env.DEPLOY_REF }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: CHATFILTER_API_ID,CHATFILTER_API_HASH,CHATFILTER_ADMIN_LOGIN,CHATFILTER_ADMIN_PASSWORD,CHATFILTER_DATABASE_URL,DEPLOY_REF
          script: |
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"

            APP_DIR="$HOME/chatfilter"
            DATA_DIR="$HOME/chatfilter-data"

            echo "=== Deploying ChatFilter (ref: ${DEPLOY_REF}) ==="

            # Clone or update repo
            if [ ! -d "${APP_DIR}/.git" ]; then
              git clone git@github.com:Puremag1c/ChatFilter.git "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git fetch origin --tags --force
            git checkout "${DEPLOY_REF}"
            # If it's a branch, pull latest
            git pull origin "${DEPLOY_REF}" 2>/dev/null || true

            # Generate .env from GitHub Secrets
            printf '%s\n' \
              "CHATFILTER_HOST=127.0.0.1" \
              "CHATFILTER_PORT=8000" \
              "CHATFILTER_DEBUG=false" \
              "CHATFILTER_DATA_DIR=/home/deploy/chatfilter-data" \
              "CHATFILTER_LOG_LEVEL=INFO" \
              "CHATFILTER_LOG_TO_FILE=true" \
              "CHATFILTER_CORS_ORIGINS=[\"https://chats.xn--zn-wma.com\"]" \
              "CHATFILTER_API_ID=${CHATFILTER_API_ID}" \
              "CHATFILTER_API_HASH=${CHATFILTER_API_HASH}" \
              "CHATFILTER_ADMIN_LOGIN=${CHATFILTER_ADMIN_LOGIN}" \
              "CHATFILTER_ADMIN_PASSWORD=${CHATFILTER_ADMIN_PASSWORD}" \
              "CHATFILTER_DATABASE_URL=${CHATFILTER_DATABASE_URL}" \
              > "${APP_DIR}/.env"
            chmod 600 "${APP_DIR}/.env"

            # Install/update dependencies
            uv venv --python 3.12 --clear
            uv pip install -e . --reinstall-package chatfilter

            # Ensure Playwright browsers are installed
            .venv/bin/python -m playwright install chromium 2>/dev/null || echo "playwright install skipped"

            # Run migrations (skip if version doesn't support it)
            .venv/bin/chatfilter migrate --data-dir "${DATA_DIR}" 2>/dev/null || echo "migrate not available in this version, skipping"

            echo "=== Code deployed, restarting service ==="

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            touch ~/chatfilter/.restart-trigger
            sleep 5
            echo "=== Deploy complete ==="

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://chats.xn--zn-wma.com/" || echo "000")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
            echo "Health check passed (HTTP ${STATUS})"
          else
            echo "WARNING: Health check returned HTTP ${STATUS}"
            exit 1
          fi
